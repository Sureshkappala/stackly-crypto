<title>Stackly Crypto | Create Account</title>

```

</head>

<body>

<section class="login-section">

    <div class="login-box">

        <h2>Login Account</h2>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            <div class="password-box">

                <input
                    type="password"
                    id="password"
                    placeholder="Password"
                    required>

                <i class="fa-solid fa-eye"
                    id="togglePassword"></i>

            </div>

            <select id="role" required>

                <option value="">
                    Select Role
                </option>

                <option value="admin">
                    Admin
                </option>

                <option value="user">
                    User
                </option>

            </select>

            <div class="login-options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="404.html">
                    Forgot Password?
                </a>

            </div>

            <button type="submit">

                Login

            </button>
            <a href="index.html" class="home-btn">
    Back To Home
</a>

            <p>

                Don't have an account?

                <a href="register.html">
                    Create Account
                </a>

            </p>

        </form>

    </div>

</section>
<script src="js/login.js"></script>

</body>

</html>
