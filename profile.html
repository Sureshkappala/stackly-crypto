<main class="content">

    <div class="page-header">

        <h1>My Profile</h1>

        <a href="404.html" class="save-btn">
    Save Profile
</a>

    </div>

    <!-- Profile Card -->

    <div class="profile-card-box">

        <img src="images/profile-user.webp" alt="Profile">

<h2>John Smith</h2>

<p>Premium Crypto Investor</p>

<a href="404.html" class="upload-btn">
    Upload New Photo
</a>

    </div>

    <!-- Personal Information -->

    <div class="settings-card">

        <h2>Personal Information</h2>

        <div class="form-group">

            <label>Full Name</label>

            <input type="text"
                   value="John Smith">

        </div>

        <div class="form-group">

            <label>Email Address</label>

            <input type="email"
                   value="john@gmail.com">

        </div>

        <div class="form-group">

            <label>Mobile Number</label>

            <input type="text"
                   value="9876543210">

        </div>

        <div class="form-group">

            <label>Country</label>

            <input type="text"
                   value="India">

        </div>

    </div>

    <!-- KYC Status -->

    <div class="settings-card">

        <h2>KYC Verification</h2>

        <p class="kyc-approved">
            ✅ Your account is verified
        </p>

    </div>

    <!-- Security -->

    <div class="settings-card">

        <h2>Security Settings</h2>

        <div class="form-group">

            <label>Current Password</label>

            <input type="password">

        </div>

        <div class="form-group">

            <label>New Password</label>

            <input type="password">

        </div>

        <div class="form-group">

            <label>Confirm Password</label>

            <input type="password">

        </div>
        <div class="form-group">

    <a href="404.html" class="update-btn">
    Update Password
</a>

</div>
